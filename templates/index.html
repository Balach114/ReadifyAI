<!DOCTYPE html>
<html>
<head>
    <title>ReadifyAI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🧠 ReadifyAI</h1>

    <!-- Mode Toggle -->
    <div class="toggle">
        <button onclick="setMode('chat')" id="chatBtn">Chat</button>
        <button onclick="setMode('analyze')" id="analyzeBtn" class="active">Analyze</button>
    </div>

    <textarea id="input" placeholder="Paste text here..."></textarea>

    <button onclick="handleAction()" id="btn">Analyze</button>

    <div id="output"></div>

    <div id="history"></div>
</div>

<script>
let mode = "analyze";

function setMode(m) {
    mode = m;

    document.getElementById("btn").innerText = m === "chat" ? "Send" : "Analyze";

    document.getElementById("chatBtn").classList.remove("active");
    document.getElementById("analyzeBtn").classList.remove("active");

    document.getElementById(m + "Btn").classList.add("active");
}

function handleAction() {
    if (mode === "chat") sendMessage();
    else analyze();
}

function analyze() {
    let btn = document.getElementById("btn");
    btn.innerText = "Analyzing...";
    btn.disabled = true;

    let text = document.getElementById("input").value;

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text})
    })
    .then(res => res.json())
    .then(data => {
        let result = data.result || data.error;

        document.getElementById("output").innerText = result;

        // ✅ IMPORTANT FIX
        btn.innerText = "Analyze";
        btn.disabled = false
        })
    .catch(err => {
        console.log(err);

        // Verdict coloring
        let color = "white";
        if (result.includes("Likely Real")) color = "lightgreen";
        if (result.includes("Suspicious")) color = "red";

        // Confidence bar
        let match = result.match(/Confidence:\s*(\d+)/);
        let percent = match ? match[1] : 50;

        document.getElementById("output").innerHTML = `
            <div style="color:${color}">
                ${result.replace(/### (.*?)/g, "<h3>$1</h3>").replace(/\n/g,"<br>")}
            </div>
            <div class="bar">
                <div class="fill" style="width:${percent}%"></div>
            </div>
            <p>${percent}% Confidence</p>
        `;

        saveHistory(text, result);

        btn.innerText = "Analyze";
        btn.disabled = false;
    });
}

function sendMessage() {
    let text = document.getElementById("input").value;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = data.result;
        saveHistory(text, data.result);
    });
}

function saveHistory(input, output) {
    let history = document.getElementById("history");

    let item = document.createElement("div");
    item.className = "history-item";
    item.innerText = "📝 " + input;

    history.prepend(item);
}
</script>

</body>
</html>
