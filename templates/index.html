<!DOCTYPE html>
<html>
<head>
    <title>ReadifyAI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🧠 ReadifyAI</h1>

    <!-- Mode Toggle -->
    <div class="toggle">
        <button onclick="setMode('chat')" id="chatBtn">Chat</button>
        <button onclick="setMode('analyze')" id="analyzeBtn" class="active">Analyze</button>
    </div>

    <textarea id="input" placeholder="Paste text here..."></textarea>

    <button onclick="handleAction()" id="btn">Analyze</button>

    <div id="output"></div>

    <div id="history"></div>
</div>

<script>
let mode = "analyze";

function setMode(m) {
    mode = m;

    let btn = document.getElementById("btn");
    btn.innerText = m === "chat" ? "Send" : "Analyze";

    document.getElementById("chatBtn").classList.remove("active");
    document.getElementById("analyzeBtn").classList.remove("active");

    document.getElementById(m + "Btn").classList.add("active");
}

function handleAction() {
    if (mode === "chat") {
        sendMessage();
    } else {
        analyze();
    }
}

function analyze() {
    let btn = document.getElementById("btn");
    let inputBox = document.getElementById("input");

    let text = inputBox.value;

    if (!text.trim()) return;

    btn.innerText = "Analyzing...";
    btn.disabled = true;

    fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        let result = data.result || data.error || "No response";

        // Color logic
        let color = "white";
        if (result.includes("Likely Real")) color = "lightgreen";
        if (result.includes("Suspicious")) color = "red";

        // Confidence
        let match = result.match(/Confidence:\s*(\d+)/);
        let percent = match ? match[1] : 50;

        document.getElementById("output").innerHTML = `
            <div style="color:${color}">
                ${result.replace(/\n/g, "<br>")}
            </div>
            <div class="bar">
                <div class="fill" style="width:${percent}%"></div>
            </div>
            <p>${percent}% Confidence</p>
        `;

        saveHistory(text);

        inputBox.value = "";

        btn.innerText = "Analyze";
        btn.disabled = false;
    })
    .catch(err => {
        console.log(err);
        document.getElementById("output").innerText = "Error occurred";

        btn.innerText = "Analyze";
        btn.disabled = false;
    });
}

function sendMessage() {
    let inputBox = document.getElementById("input");
    let text = inputBox.value;

    if (!text.trim()) return;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = data.result || "No response";
        saveHistory(text);
        inputBox.value = "";
    })
    .catch(err => {
        console.log(err);
    });
}

function saveHistory(input) {
    let history = document.getElementById("history");

    let item = document.createElement("div");
    item.className = "history-item";
    item.innerText = "📝 " + input;

    history.prepend(item);
}
</script>

</body>
</html>
